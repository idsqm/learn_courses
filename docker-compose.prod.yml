services:
  courses-app:
    build:
      context: .
      target: runner
    ports:
      - "127.0.0.1:${SERVER_PORT:-8081}:8081"
    environment:
      SERVER_PORT: ${SERVER_PORT:-8081}
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@courses-db:5432/${POSTGRES_DB}?sslmode=disable
      JWT_SECRET: ${JWT_SECRET}
      AUTH_SERVICE_URL: http://auth-app:8080
    restart: unless-stopped
    depends_on:
      courses-db:
        condition: service_healthy
    networks:
      - learnquest

  courses-db:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    networks:
      - learnquest

volumes:
  pgdata:

networks:
  learnquest:
    external: true
