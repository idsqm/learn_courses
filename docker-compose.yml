services:
  courses-app:
    build:
      context: .
      target: runner
    ports:
      - "${SERVER_PORT:-8081}:8081"
    environment:
      SERVER_PORT: ${SERVER_PORT:-8081}
      DATABASE_URL: postgres://${POSTGRES_USER:-courses}:${POSTGRES_PASSWORD:-courses}@courses-db:5432/${POSTGRES_DB:-courses}?sslmode=disable
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-me}
      DEBUG: ${DEBUG:-false}
      AUTH_SERVICE_URL: http://auth-app:8080
    depends_on:
      courses-db:
        condition: service_healthy
    networks:
      - learnquest

  courses-dev:
    build:
      context: .
      target: builder
    working_dir: /app
    volumes:
      - .:/app
      - gomodcache:/go/pkg/mod
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-courses}:${POSTGRES_PASSWORD:-courses}@courses-db:5432/${POSTGRES_DB:-courses}?sslmode=disable
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-me}
    depends_on:
      courses-db:
        condition: service_healthy
    profiles:
      - tools
    networks:
      - learnquest

  courses-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-courses}
      POSTGRES_USER: ${POSTGRES_USER:-courses}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-courses}
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-courses}"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - learnquest

volumes:
  pgdata:
  gomodcache:

networks:
  learnquest:
    external: true
